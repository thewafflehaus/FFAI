name: Lint

# Run `make format-check` (swift-format lint) on every PR + push to a
# protected branch. Catches formatting drift before review without
# requiring contributors to remember to run it locally — though
# `make install-hooks` wires the same check into the local pre-commit
# hook so most contributors never hit a CI lint failure.
#
# Scope is just swift-format. No build, no tests — those live in CI.

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/dev' }}

jobs:
  format-check:
    if: github.repository_owner == 'thewafflehaus'
    name: swift-format lint
    runs-on: macos-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Ensure swift-format is available
        # macos-latest ships an Xcode toolchain that bundles swift-format
        # (resolved via `xcrun swift-format`). Fall back to Homebrew if
        # for any reason the toolchain doesn't carry it.
        run: |
          if xcrun --find swift-format >/dev/null 2>&1; then
            echo "swift-format: $(xcrun --find swift-format) (Xcode toolchain)"
          elif command -v brew >/dev/null 2>&1; then
            brew install swift-format
          else
            echo "::error::swift-format not available and brew not installed"
            exit 1
          fi
          xcrun swift-format --version

      - name: Stub generated kernel file
        # `make format-check` runs swift-format with --recursive .
        # which will trip on `Sources/MetalTileSwift/Generated/MetalTileKernels.swift`.
        # That file is normally regenerated by `tile build --emit` (sibling
        # metaltile repo), which would prepend `// swift-format-ignore-file`.
        # CI doesn't run the metaltile codegen — much faster to drop an
        # empty stub with the directive so the lint pass skips it.
        run: |
          mkdir -p Sources/MetalTileSwift/Generated
          printf '// swift-format-ignore-file\n//\n// CI stub — real file is generated by `tile build --emit`.\n' \
            > Sources/MetalTileSwift/Generated/MetalTileKernels.swift

      - name: Run make format-check
        run: make format-check
