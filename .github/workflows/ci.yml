name: CI

# Build and test FFAI on Apple Silicon. Runs on:
#   - every push to `main` (release branch — gate before tagging)
#   - every push to `dev`  (working branch — catch regressions early)
#   - every PR targeting either branch
#
# The release workflow runs its own pre-tag test pass on the release
# commit too — see .github/workflows/release.yml.

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

concurrency:
  # Don't cancel in-progress runs on protected branches (main, dev) so
  # the green-build history stays intact; do cancel earlier runs on the
  # same feature branch as a contributor pushes new commits.
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/dev' }}

jobs:
  build_and_test:
    if: github.repository_owner == 'thewafflehaus'
    name: Build and test (Apple Silicon)
    runs-on: macos-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: FFAI

    steps:
      - name: Checkout FFAI
        uses: actions/checkout@v6
        with:
          path: FFAI

      - name: Checkout sibling metaltile
        # Pinned to `dev` for now because:
        #   - thewafflehaus/metaltile main is behind upstream's CLI rework.
        #   - upstream/metaltile main is a `gm` placeholder commit.
        #   - All the kernels FFAI's Ops.swift expects live on
        #     thewafflehaus/metaltile dev (post the ek/std-kernels merge).
        # Move back to `main` once we sync our org's main from upstream's
        # post-CLI-rework main, or cut a metaltile release tag and pin to it.
        uses: actions/checkout@v6
        with:
          repository: thewafflehaus/metaltile
          ref: dev
          path: metaltile

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version
          uname -a

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache cargo registry + metaltile build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ github.workspace }}/metaltile/target
          key: cargo-${{ runner.os }}-${{ hashFiles('metaltile/Cargo.lock', 'metaltile/Cargo.toml') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Cache SwiftPM build artifacts
        uses: actions/cache@v5
        with:
          path: |
            FFAI/.build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('FFAI/Package.swift', 'FFAI/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Cache HuggingFace model snapshots
        # Integration tests pull mlx-community/* + unsloth/* checkpoints
        # from HF on first run (several GB per model). Cache the whole
        # ~/.cache/huggingface/hub so subsequent runs skip the download.
        #
        # Fixed key (no hashFiles): GitHub evicts oldest entries when the
        # repo exceeds the 10 GB cache quota, so the most-used models
        # stay warm + tail evictions just re-download on the next run.
        # Bump `-v1` if we need to invalidate (e.g. integration test
        # switches to a different model variant).
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface/hub
          key: hf-models-${{ runner.os }}-v1
          restore-keys: |
            hf-models-${{ runner.os }}-

      - name: Resolve Swift packages
        run: swift package resolve

      - name: Generate kernel artifacts (tile build --emit all)
        # Compiles metaltile and produces kernels.metallib + manifest.json
        # + Generated/MetalTileKernels.swift into FFAI/Sources/MetalTileSwift/.
        # Once the `tile` binary ships via Homebrew this no longer needs
        # the sibling metaltile checkout. Run from metaltile/ so its
        # rust-toolchain.toml (nightly, 2024 edition) is picked up.
        working-directory: metaltile
        run: |
          cargo run --release --bin tile -- build --emit all \
            --out ${{ github.workspace }}/FFAI/Sources/MetalTileSwift

      - name: Build
        run: swift build

      - name: Run unit tests (parallel)
        # FFAITests (215 cases) + MetalTileSwiftTests (kernel round-trip).
        # Fast — runs in parallel against the just-built binary.
        run: swift test --enable-code-coverage --skip-build --filter "FFAITests|MetalTileSwiftTests"

      - name: Run integration tests (serialized — models load one at a time)
        # ModelTests pull HF snapshots and run real end-to-end inference
        # against Llama / Qwen3 (×5 quants) / Mamba 2. Each load peaks
        # 3-8 GB on GPU; macos-latest M1 runners cap at 7 GB RAM, so
        # parallel suites OOM-thrash. `--num-workers 1` forces one suite
        # in memory at a time. `--enable-code-coverage` merges into the
        # same .profdata file the unit-tests step wrote.
        run: swift test --enable-code-coverage --skip-build --filter "ModelTests" --num-workers 1

      - name: Coverage summary
        if: always()
        run: |
          BIN_PATH=$(swift build --show-bin-path)
          PROF_DATA="$BIN_PATH/codecov/default.profdata"
          if [ -f "$PROF_DATA" ]; then
            xcrun llvm-cov report \
              "$BIN_PATH/FFAIPackageTests.xctest/Contents/MacOS/FFAIPackageTests" \
              -instr-profile="$PROF_DATA" \
              -ignore-filename-regex='(\.build|Tests|Generated)' || true
          else
            echo "No coverage data produced (no tests ran?)"
          fi

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            FFAI/.build/**/Logs/Test/*.xcresult
          retention-days: 7
