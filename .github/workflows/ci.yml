name: CI

# Build + unit-test FFAI on Apple Silicon. Runs on:
#   - every push to `main` (release branch — gate before tagging)
#   - every push to `dev`  (working branch — catch regressions early)
#   - every PR targeting either branch
#
# Scope is intentionally limited to the **unit suite** (FFAITests +
# MetalTileSwiftTests). The integration suite (ModelTests) downloads
# multi-GB HuggingFace snapshots + does real end-to-end inference —
# too slow for every PR, and OOM-prone on the runner's 7 GB cap.
# The release workflow exercises the integration suite right before
# tagging — see .github/workflows/release.yml — so if a dev change
# breaks a model we catch it at the release boundary, not on each PR.

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

concurrency:
  # Don't cancel in-progress runs on protected branches (main, dev) so
  # the green-build history stays intact; do cancel earlier runs on the
  # same feature branch as a contributor pushes new commits.
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/dev' }}

jobs:
  build_and_test:
    if: github.repository_owner == 'thewafflehaus'
    name: Build and test (Apple Silicon)
    runs-on: macos-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: FFAI

    steps:
      - name: Checkout FFAI
        uses: actions/checkout@v6
        with:
          path: FFAI

      - name: Checkout sibling metaltile
        # Pinned to `TheTom/metaltile tom/wip/gguf-dequant` for this WIP
        # branch only — that branch carries the GGUF dequant kernels
        # (ffai_gguf_dequant_q8_0 / q2_K / iq2_xxs) + the DSv4 kernels
        # (compressor_pool, mhc_pre/post, sdpa_decode_d512_sink,
        # moe_router_sqrtsoftplus, mxfp4_dequant, fp8_block_dequant) that
        # this FFAI branch's OpsGGUF + DeepSeekV4 paths reference. Revert
        # to `thewafflehaus/metaltile dev` once those kernels are merged
        # into dev (mirror PR pending).
        uses: actions/checkout@v6
        with:
          repository: TheTom/metaltile
          ref: tom/wip/gguf-dequant
          path: metaltile

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version
          uname -a

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache cargo registry + metaltile build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ github.workspace }}/metaltile/target
          key: cargo-${{ runner.os }}-${{ hashFiles('metaltile/Cargo.lock', 'metaltile/Cargo.toml') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Cache SwiftPM build artifacts
        uses: actions/cache@v5
        with:
          path: |
            FFAI/.build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('FFAI/Package.swift', 'FFAI/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Resolve Swift packages
        run: swift package resolve

      - name: Generate kernel artifacts (tile build --emit all)
        # Compiles metaltile and produces kernels.metallib + manifest.json
        # + Generated/MetalTileKernels.swift into FFAI/Sources/MetalTileSwift/.
        # Once the `tile` binary ships via Homebrew this no longer needs
        # the sibling metaltile checkout. Run from metaltile/ so its
        # rust-toolchain.toml (nightly, 2024 edition) is picked up.
        working-directory: metaltile
        run: |
          cargo run --release --bin tile -- build --emit all \
            --out ${{ github.workspace }}/FFAI/Sources/MetalTileSwift

      - name: Run unit tests (with coverage)
        # FFAITests + MetalTileSwiftTests (kernel round-trip).
        # Integration tests (ModelTests) are deliberately excluded — they
        # ship a different way (release.yml runs them right before tagging).
        #
        # One swift test invocation handles compile + coverage
        # instrumentation + run in a single pass. A separate `swift build`
        # step is intentionally NOT used here: --enable-code-coverage
        # needs -profile-generate / -profile-coverage-mapping to be on at
        # compile time, which --skip-build cannot apply retroactively. The
        # symptom is tests pass but the run exits 1 with "The folder
        # 'codecov' doesn't exist". Letting swift test own the build keeps
        # the coverage and testability flags in lockstep.
        run: swift test --enable-code-coverage --filter "FFAITests|MetalTileSwiftTests"

      - name: Coverage summary
        if: always()
        run: |
          BIN_PATH=$(swift build --show-bin-path)
          PROF_DATA="$BIN_PATH/codecov/default.profdata"
          if [ -f "$PROF_DATA" ]; then
            xcrun llvm-cov report \
              "$BIN_PATH/FFAIPackageTests.xctest/Contents/MacOS/FFAIPackageTests" \
              -instr-profile="$PROF_DATA" \
              -ignore-filename-regex='(\.build|Tests|Generated)' || true
          else
            echo "No coverage data produced (no tests ran?)"
          fi

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            FFAI/.build/**/Logs/Test/*.xcresult
          retention-days: 7
